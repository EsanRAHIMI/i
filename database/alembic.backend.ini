[alembic]
script_location = /database/migrations/backend
prepend_sys_path = /database/src:/database/vendor/backend

# این مقدار در env.py override می‌شود (از DATABASE_URL/POSTGRES_*)
sqlalchemy.url = postgresql://postgres:postgres@localhost:5432/intelligent_ai_assistant

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

