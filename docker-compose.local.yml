version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: i_assistant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [app]

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks: [app]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/i_assistant
      REDIS_URL: redis://redis:6379/0
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      FRONTEND_URL: http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    networks: [app]
    volumes:
      - ./backend:/app
      - uploads:/app/uploads

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/i_assistant
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      AUTH_PUBLIC_BASE_URL: http://localhost:8001
      FRONTEND_URL: http://localhost:3000
    ports:
      - "8001:8001"
    depends_on:
      - postgres
    networks: [app]
    volumes:
      - ./auth-service:/app
      - auth_uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
        NEXT_PUBLIC_AUTH_API_URL: http://localhost:8001/v1
        NEXT_PUBLIC_WS_URL: ws://localhost:8000/ws
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_AUTH_API_URL: http://localhost:8001/v1
      NEXT_PUBLIC_WS_URL: ws://localhost:8000/ws
    ports:
      - "3000:3000"
    depends_on:
      - backend
      - auth-service
    networks: [app]
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
  uploads:
  auth_uploads:

networks:
  app:
    driver: bridge
